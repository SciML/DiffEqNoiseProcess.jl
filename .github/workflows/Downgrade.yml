name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  # Runs strict (allow_reresolve=false); expected RED until ForwardDiff/LogExpFunctions strict wall (likely) resolves.
  test:
    name: "Downgrade"
    strategy:
      matrix:
        julia-version: ['lts']
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "${{ matrix.julia-version }}"
    secrets: "inherit"
